name: Watch Dify Docker Changes

on:
  schedule:
    # 每天 UTC 0:00 执行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手动触发

permissions:
  issues: write
  contents: write

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get last known commit
        id: last
        run: |
          if [ -f .last-docker-commit ]; then
            echo "sha=$(cat .last-docker-commit)" >> $GITHUB_OUTPUT
          else
            echo "sha=" >> $GITHUB_OUTPUT
          fi

      - name: Fetch latest docker commit from Dify
        id: fetch
        run: |
          RESPONSE=$(curl -s "https://api.github.com/repos/langgenius/dify/commits?path=docker&sha=main&per_page=1")
          COMMIT_SHA=$(echo "$RESPONSE" | jq -r '.[0].sha')
          COMMIT_MSG=$(echo "$RESPONSE" | jq -r '.[0].commit.message')
          COMMIT_AUTHOR=$(echo "$RESPONSE" | jq -r '.[0].commit.author.name')
          COMMIT_DATE=$(echo "$RESPONSE" | jq -r '.[0].commit.author.date')

          echo "sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          echo "date=$COMMIT_DATE" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: check
        run: |
          if [ "${{ steps.last.outputs.sha }}" != "${{ steps.fetch.outputs.sha }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue notification
        if: steps.check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.fetch.outputs.sha }}';
            const message = `${{ steps.fetch.outputs.message }}`;
            const author = '${{ steps.fetch.outputs.author }}';
            const date = '${{ steps.fetch.outputs.date }}';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔔 Dify Docker 目录有新变动',
              body: `## 变动信息

            - **Commit**: [\`${sha.substring(0, 7)}\`](https://github.com/langgenius/dify/commit/${sha})
            - **作者**: ${author}
            - **时间**: ${date}
            - **消息**:
              \`\`\`
              ${message}
              \`\`\`

            ## 需要检查

            请检查 [Dify docker 目录](https://github.com/langgenius/dify/commits/main/docker) 的最新变动，确认是否需要更新本仓库的安装脚本。

            ---
            *此 Issue 由 GitHub Actions 自动创建*
            `,
              labels: ['upstream-change']
            });

      - name: Update last known commit
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ steps.fetch.outputs.sha }}" > .last-docker-commit

      - name: Commit updated tracking file
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-docker-commit
          git commit -m "chore: update last docker commit sha"
          git push
